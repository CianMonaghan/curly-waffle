<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create or Load Character Sheet Page</title>
    <link rel="stylesheet" href="account.css"></link>
    
    <script>
        fetch('/api/auth/me').then(r => {
            if (!r.ok) window.location.href = '/login.html';
        });

        function logout() {
            fetch('/api/auth/logout', { method: 'POST' })
                .then(() => window.location.href = '/login.html');
        }
    </script>
</head>
<body>
    <header style="display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:3px solid #7B1A1A; margin-bottom:16px; background:#e8dcc8;">
        <img src="/Blite_Logo_Transparent.png" alt="Blite Logo" style="height:40px; width:auto;">
        <span style="font-size:22px; font-weight:900; letter-spacing:4px; text-transform:uppercase; font-family:Georgia,serif; color:#7B1A1A;">Blite</span>
    </header>

    <div class="container">
        <div> <!--Column 1-->
            <iframe src="character_box.html" width="100%" height="800" frameborder=1></iframe>
        </div>
        <div> <!--Column 2-->
            <h3>Would you like to create a character sheet?</h3>
            <form action="create_character.html">
                <button type="submit">Create Character</button>
            </form>
            <form action="login.html">
                <button type="submit">Return to Login</button>
            </form>
    </div>
    </div>
</body>
</html>
