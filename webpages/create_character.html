<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Character Sheet Creation</title>
    <link rel="stylesheet" href="create_character.css">
</head>
<body>
    <h1>Character Editor</h1>

    <div class="character-buttons">
        <button type="button" onclick="window.location.href='account.html'">Return</button>
        <button type="button" id="saveCharacterBtn">Save Character</button>
        <button type="button" id="saveAsNewBtn" style="display:none;">Save as New Character</button>
    </div>

    <div class="container">
        <div>
            <!-- CHaracter Name/Race/Background -->
            <div class="field-row">
                <label for="character-name">Character Name</label>
                <input type="text" id="character-name" name="character-name" required>
            </div>

            <div class="field-row">
                <label>Character Race</label>
                <button type="button" class="popup-btn" id="race-btn">Select Race ▾</button>
                <input type="hidden" id="race" name="race">
            </div>

            <div class="field-row">
                <label>Character Background</label>
                <button type="button" class="popup-btn" id="background-btn">Select Background ▾</button>
                <input type="hidden" id="background" name="background">
            </div>

            <!-- Ability Scores -->
            <div class="ability-scores-row">
            <div class="ability-box">
                <div class="ability-label">Str</div>
                <input type="number" class="ability-score" id="ability-str" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
            <div class="ability-box">
                <div class="ability-label">Dex</div>
                <input type="number" class="ability-score" id="ability-dex" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
            <div class="ability-box">
                <div class="ability-label">Con</div>
                <input type="number" class="ability-score" id="ability-con" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
            <div class="ability-box">
                <div class="ability-label">Int</div>
                <input type="number" class="ability-score" id="ability-int" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
            <div class="ability-box">
                <div class="ability-label">Wis</div>
                <input type="number" class="ability-score" id="ability-wis" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
            <div class="ability-box">
                <div class="ability-label">Cha</div>
                <input type="number" class="ability-score" id="ability-cha" min="1" max="20" value="10" required oninput="if(this.value>20)this.value=20;">
            </div>
        </div>

            <!-- Class Boxes -->
            <div id="classContainer"></div>
            <button id="addClassBtn">+ Add Character Class</button>
        </div>

        <!-- Right Column: Race & Background Info Panels -->
        <div class="info-column">

            <div id="race-info-panel" class="info-panel hidden">
                <div class="info-panel-header">
                    <span class="info-panel-label">Race</span>
                    <button type="button" class="info-panel-edit-btn" onclick="openPopup('race')">Change ▾</button>
                </div>
                <div class="info-panel-content"></div>
            </div>

            <div id="background-info-panel" class="info-panel hidden">
                <div class="info-panel-header">
                    <span class="info-panel-label">Background</span>
                    <button type="button" class="info-panel-edit-btn" onclick="openPopup('background')">Change ▾</button>
                </div>
                <div class="info-panel-content"></div>
            </div>

        </div>
    </div>

    <!-- Race/Background Popup -->
    <div id="popup-overlay" class="popup-overlay hidden">
        <div class="popup-modal">

            <div class="popup-modal-header">
                <strong id="popup-title">Choose</strong>
                <button type="button" id="popup-close" class="popup-close-btn">✕</button>
            </div>

            <div class="popup-modal-body">
                <!-- Left side -->
                <div class="popup-sidebar">
                    <div id="popup-list" class="popup-list"></div>
                </div>

                <!-- Right side -->
                <div id="popup-detail" class="popup-detail">
                    <p class="popup-placeholder">Select an option to see details.</p>
                </div>
            </div>

            <div class="popup-modal-footer">
                <button type="button" id="popup-confirm" class="popup-confirm-btn" disabled>Confirm Selection</button>
            </div>

        </div>
    </div>

    <!-- Class Template -->
    <template id="classTemplate">
        <div class="character-class-box">
            <div class="class-box-header">
                <strong class="class-title">Class 1</strong>
                <div style="display:flex; align-items:center; gap:12px;">
                    <label><input type="checkbox" class="primary-class-cb"> Set Primary Class</label>
                    <button class="remove-btn">Remove</button>
                </div>
            </div>

            <div class="field-row">
                <label>Class</label>
                <select class="class-select"></select>
            </div>
            <div class="field-row">
                <label>Subclass</label>
                <select class="subclass-select"></select>
            </div>
            <div class="field-row">
                <label>Level</label>
                <input type="number" class="level-input" min="1" max="20" value="1" style="width:60px;">
            </div>

            <div class="class-box-body">
                <div class="class-left">
                    <strong class="skill-count-label">Skills:</strong>
                    <div class="skill-list"></div>

                    <!-- Equipment sits under skills, both are creation-time choices -->
                    <strong class="equipment-label">Equipment:</strong>
                    <p style="font-size:0.85em; color:#555; margin:2px 0 6px;">
                        In addition to equipment from your background:
                    </p>
                    <div class="equipment-container"></div>
                </div>
                <div class="class-right">
                    <div class="feature-container"></div>
                </div>
            </div>
        </div>
    </template>

    <script src="create_character.js"></script>
</body>
</html>
